services:
  postgres_test:
    image: postgres:15-alpine
    container_name: mini_erp_db_test
    environment:
      POSTGRES_DB: mini_erp_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_erp_test"]
      interval: 5s
      timeout: 3s
      retries: 10
